{% extends 'base.html' %}

{% block title %}تسجيل الدخول{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-4">
                <h3 class="text-center mb-4 fw-bold">تسجيل الدخول</h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">اسم المستخدم</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">كلمة المرور</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 py-2">دخول</button>
                </form>
                <hr>
                <p class="text-center mb-0">ليس لديك حساب؟
                    <a href="{% url 'accounts:register' %}" class="text-warning fw-bold">أنشئ حساباً</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
